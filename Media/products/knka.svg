<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" role="img" aria-label="KNKA HEPA tower air purifier">
  <defs>
    <linearGradient id="k_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/><stop offset="1" stop-color="#e9f9ef"/>
    </linearGradient>
    <linearGradient id="k_body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#f3f7fa"/><stop offset="1" stop-color="#d7e2ea"/>
    </linearGradient>
    <linearGradient id="k_ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2AB7E6"/><stop offset="1" stop-color="#0B63B6"/>
    </linearGradient>
  </defs>
  <rect width="440" height="360" rx="26" fill="url(#k_bg)"/>
  <ellipse cx="220" cy="320" rx="120" ry="18" fill="#0c1722" opacity="0.12"/>
  <!-- tower body -->
  <rect x="166" y="60" width="108" height="252" rx="42" fill="url(#k_body)"/>
  <rect x="166" y="60" width="108" height="252" rx="42" fill="none" stroke="#c2d0db" stroke-width="2"/>
  <!-- top vent -->
  <ellipse cx="220" cy="84" rx="40" ry="14" fill="#e7eef3"/>
  <ellipse cx="220" cy="84" rx="40" ry="14" fill="none" stroke="#c2d0db" stroke-width="2"/>
  <g stroke="#9fb3c2" stroke-width="2.4" opacity="0.7">
    <line x1="196" y1="84" x2="244" y2="84"/>
    <line x1="200" y1="79" x2="240" y2="79"/>
    <line x1="200" y1="89" x2="240" y2="89"/>
  </g>
  <!-- display ring -->
  <circle cx="220" cy="150" r="30" fill="#0c1722"/>
  <circle cx="220" cy="150" r="30" fill="none" stroke="url(#k_ring)" stroke-width="5"/>
  <text x="220" y="148" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="700" fill="#79C843">23</text>
  <text x="220" y="164" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#7fd0ef">PM2.5</text>
  <!-- side air vents -->
  <g stroke="#cdd9e2" stroke-width="3" opacity="0.8">
    <line x1="182" y1="210" x2="182" y2="288"/>
    <line x1="196" y1="210" x2="196" y2="288"/>
    <line x1="244" y1="210" x2="244" y2="288"/>
    <line x1="258" y1="210" x2="258" y2="288"/>
  </g>
  <!-- touch buttons -->
  <circle cx="220" cy="216" r="6" fill="#2AB7E6"/>
  <circle cx="220" cy="236" r="5" fill="#79C843"/>
  <!-- rising clean air -->
  <g stroke="#79C843" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65">
    <path d="M210 56 q-6 -16 6 -30"/>
    <path d="M230 56 q6 -14 -4 -28"/>
    <path d="M220 50 q0 -14 0 -26"/>
  </g>
</svg>
