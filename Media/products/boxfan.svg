<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" role="img" aria-label="Box fan paired with MERV-13 filter">
  <defs>
    <linearGradient id="b_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f9ef"/><stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="b_frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f5f8"/><stop offset="1" stop-color="#cfd9e1"/>
    </linearGradient>
    <linearGradient id="b_filter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A8E063"/><stop offset="1" stop-color="#1E8E3E"/>
    </linearGradient>
    <radialGradient id="b_hub" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2AB7E6"/><stop offset="1" stop-color="#0B63B6"/>
    </radialGradient>
  </defs>
  <rect width="440" height="360" rx="26" fill="url(#b_bg)"/>
  <ellipse cx="222" cy="318" rx="150" ry="20" fill="#0c1722" opacity="0.12"/>
  <!-- MERV filter behind, offset -->
  <g transform="rotate(-7 150 180)">
    <rect x="84" y="96" width="150" height="150" rx="8" fill="url(#b_filter)"/>
    <rect x="84" y="96" width="150" height="150" rx="8" fill="none" stroke="#15692c" stroke-width="3"/>
    <g stroke="#0f5021" stroke-width="3" opacity="0.5">
      <line x1="84" y1="120" x2="234" y2="120"/><line x1="84" y1="144" x2="234" y2="144"/>
      <line x1="84" y1="168" x2="234" y2="168"/><line x1="84" y1="192" x2="234" y2="192"/>
      <line x1="84" y1="216" x2="234" y2="216"/>
    </g>
    <rect x="96" y="104" width="60" height="18" rx="4" fill="#ffffff" opacity="0.85"/>
    <text x="126" y="117" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="700" fill="#1E8E3E">MERV 13</text>
  </g>
  <!-- box fan frame -->
  <rect x="186" y="92" width="178" height="178" rx="20" fill="url(#b_frame)"/>
  <rect x="186" y="92" width="178" height="178" rx="20" fill="none" stroke="#aebcc7" stroke-width="2"/>
  <rect x="204" y="110" width="142" height="142" rx="10" fill="#dde6ec"/>
  <!-- fan blades -->
  <circle cx="275" cy="181" r="64" fill="#eef3f6"/>
  <g fill="#9fb3c2" opacity="0.92">
    <path d="M275 181 L275 121 q34 8 34 44 z"/>
    <path d="M275 181 L327 211 q-22 28 -56 18 z"/>
    <path d="M275 181 L223 211 q-14 -32 18 -52 z"/>
  </g>
  <circle cx="275" cy="181" r="16" fill="url(#b_hub)"/>
  <circle cx="275" cy="181" r="16" fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <!-- grille arcs -->
  <g stroke="#b9c6d1" stroke-width="2" fill="none" opacity="0.7">
    <circle cx="275" cy="181" r="34"/><circle cx="275" cy="181" r="50"/>
  </g>
  <!-- clean air out -->
  <g stroke="#2AB7E6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.65">
    <path d="M372 150 q26 8 50 -4"/><path d="M372 185 q30 6 56 -2"/><path d="M372 220 q26 -4 50 -12"/>
  </g>
</svg>
