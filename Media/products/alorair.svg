<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 360" role="img" aria-label="AlorAir portable air filtration system">
  <defs>
    <linearGradient id="a_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf6ff"/><stop offset="1" stop-color="#dcefe2"/>
    </linearGradient>
    <linearGradient id="a_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2a3a"/><stop offset="1" stop-color="#0c1722"/>
    </linearGradient>
    <linearGradient id="a_ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2AB7E6"/><stop offset="1" stop-color="#0B63B6"/>
    </linearGradient>
    <radialGradient id="a_grille" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#33424f"/><stop offset="1" stop-color="#11202c"/>
    </radialGradient>
  </defs>
  <rect width="440" height="360" rx="26" fill="url(#a_bg)"/>
  <ellipse cx="220" cy="316" rx="150" ry="20" fill="#0c1722" opacity="0.12"/>
  <!-- body -->
  <rect x="120" y="78" width="200" height="210" rx="26" fill="url(#a_body)"/>
  <rect x="120" y="78" width="200" height="210" rx="26" fill="none" stroke="#2c3e4d" stroke-width="2"/>
  <!-- handle -->
  <path d="M168 78 q52 -42 104 0" fill="none" stroke="#1a2a3a" stroke-width="14" stroke-linecap="round"/>
  <!-- intake ring -->
  <circle cx="220" cy="190" r="78" fill="url(#a_ring)"/>
  <circle cx="220" cy="190" r="78" fill="none" stroke="#86d8f5" stroke-width="3" opacity="0.5"/>
  <circle cx="220" cy="190" r="62" fill="url(#a_grille)"/>
  <!-- grille slats -->
  <g stroke="#0B63B6" stroke-width="5" opacity="0.55">
    <line x1="170" y1="190" x2="270" y2="190"/>
    <line x1="176" y1="168" x2="264" y2="168"/>
    <line x1="176" y1="212" x2="264" y2="212"/>
    <line x1="190" y1="148" x2="250" y2="148"/>
    <line x1="190" y1="232" x2="250" y2="232"/>
  </g>
  <circle cx="220" cy="190" r="14" fill="#2AB7E6"/>
  <circle cx="220" cy="190" r="14" fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <!-- control panel -->
  <rect x="150" y="96" width="64" height="20" rx="6" fill="#11202c"/>
  <circle cx="162" cy="106" r="4" fill="#79C843"/>
  <circle cx="178" cy="106" r="4" fill="#2AB7E6"/>
  <rect x="190" y="102" width="18" height="8" rx="4" fill="#2c3e4d"/>
  <!-- airflow lines -->
  <g stroke="#1E8E3E" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M330 150 q34 8 64 -6"/>
    <path d="M330 190 q40 6 72 -2"/>
    <path d="M330 230 q34 -4 64 -14"/>
  </g>
</svg>
